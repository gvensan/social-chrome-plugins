name: Pages

# Deploys the landing page in webpage/ to GitHub Pages. Runs only when the
# site changes (or manually). The site now lives in this monorepo instead of a
# separate repo, so a single commit covers both code and the page that links to
# it.
on:
  push:
    branches: [main]
    paths: ['webpage/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: webpage
      - id: deployment
        uses: actions/deploy-pages@v4
